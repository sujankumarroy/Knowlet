<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowlet Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/assistant/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/assistant/favicon-32x32.png">
    <link rel="icon" href="/assets/icons/assistant/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/assistant/apple-touch-icon.png">

    <link rel="stylesheet" href="css/assistant.css">
</head>
<body>
    <div class="chat-container">
        <div id="chatBox" class="chat-box"></div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button class="icon-btn mode" data-mode="quiz">📋 Quiz</button>
            <button class="icon-btn mode" data-mode="study">📚 Study</button>
            <button class="icon-btn mode" data-mode="short">⚡ Short</button>
            <button class="icon-btn mode" data-mode="explain">🧠 Explain</button>
            <button id="clear-all" class="icon-btn tool">🧹 Clear</button>
            <!-- Add more icons here if needed -->
        </div>

        <div class="input-area">
            <textarea id="inputText" placeholder="Type a message..."></textarea>
            <button id="btnSend">➤</button>
        </div>
    </div>

    <script src="js/assistant.js"></script>
</body>
</html>
