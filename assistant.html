<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowlet AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/assistant.css">
</head>
<body>
    <div class="container">
        <h1>Knowlet AI</h1>

        <textarea id="inputText" placeholder="Enter notes or ask a question..."></textarea>

        <select id="difficulty">
            <option value="easy">Easy Quiz</option>
            <option value="medium" selected>Medium Quiz</option>
            <option value="hard">Hard Quiz</option>
        </select>

        <button onclick="sendRequest()">Generate</button>

        <div class="loader" id="loader">Loading...</div>

        <div class="output" id="output"></div>
    </div>
    <script src="js/assistant.js"></script>
</body>
</html>
