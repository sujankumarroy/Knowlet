<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowlet Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/assistant.css">
</head>
<body>
    <div class="chat-container">
        <div id="chatBox" class="chat-box"></div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button id="quiz-mode" class="icon-btn">📋 Quiz</button>
            <button id="normal-mode" class="icon-btn">💬 Normal</button>
            <button id="clear-all" class="icon-btn">🧹 Clear</button>
            <!-- Add more icons here if needed -->
        </div>

        <div class="input-area">
            <textarea id="inputText" placeholder="Type a message..."></textarea>
            <button id="btnSend" onclick="sendRequest()">➤</button>
        </div>
    </div>

    <script src="js/assistant.js"></script>
</body>
</html>
